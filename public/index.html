<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>250750.xyz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="remote-grid"></div>
    <div id="local-wrapper">
      <video id="local-video" autoplay playsinline muted></video>
    </div>
    <div id="waiting-msg">Waiting for others to join…</div>

    <!-- Screen share button — bottom left corner -->
    <button id="share-btn" title="Share screen">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 3H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h6v2H7v2h10v-2h-3v-2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 13H4V5h16v11z"/>
      </svg>
    </button>
  </div>

  <div id="gesture-icon" class="hidden"></div>
  <div id="toast" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
