<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>250750.xyz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- local self-view panel -->
    <div id="local-panel" class="vid-panel">
      <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div id="waiting-msg">Waiting for others to join…</div>
  </div>

  <div id="voice-overlay" class="hidden">
    <span class="vo-icon">🎙️</span>
    <span class="vo-label">Voice Only</span>
    <span class="vo-hint">Tap to exit</span>
  </div>
  <div id="voice-indicators"></div>
  <div id="ctrl-panel" class="hidden">
    <button id="btn-mic"   class="ctrl-btn"><span class="ci">🎤</span><span class="cl">Mute</span></button>
    <button id="btn-cam"   class="ctrl-btn"><span class="ci">📷</span><span class="cl">Camera</span></button>
    <button id="btn-voice" class="ctrl-btn"><span class="ci">🎙️</span><span class="cl">Voice only</span></button>
    <button id="btn-share" class="ctrl-btn"><span class="ci">🖥️</span><span class="cl">Share</span></button>
  </div>
  <div id="toast" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
